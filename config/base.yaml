application:
  name: AICOS
  debug: false
  data_directory: data
logging:
  level: INFO
  format: json
  console_enabled: true
  file_enabled: true
  file_path: data/logs/aicos.log
  max_bytes: 10485760
  backup_count: 5
sqlite:
  path: data/aicos.db
  timeout_seconds: 30
  wal_enabled: true
chromadb:
  host: localhost
  port: 8000
  persist_directory: data/chroma
  use_http: false
ollama:
  enabled: true
  base_url: http://localhost:11434
  timeout_seconds: 120
  default_model: null
  embedding_model: Qwen3-Embedding:0.6B
openrouter:
  enabled: false
  base_url: https://openrouter.ai/api/v1
  api_key: null
  timeout_seconds: 120
  default_model: null
mcp:
  enabled: true
  configuration_directory: config/mcp
  request_timeout_seconds: 30
knowledge:
  chunk_size: 1000
  chunk_overlap: 200
  supported_extensions:
    - .txt
    - .md
    - .pdf
  default_collection: knowledge
retrieval:
  default_top_k: 10
  max_top_k: 100
  similarity_threshold: 0.0
rag:
  default_top_k: 10
  max_context_chunks: 5
  max_prompt_tokens: 4096
  default_system_prompt: "You are a helpful AI assistant. Answer the user's question based on the provided context. If the context does not contain enough information to answer, say so."
scheduler:
  enabled: true
  timezone: UTC
  max_concurrent_jobs: 4
ui:
  host: 127.0.0.1
  port: 3000
  allow_remote_access: false
